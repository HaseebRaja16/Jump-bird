// ── REST helpers ─────────────────────────────────────────
async function sbRead(code){
try{
const r=await fetch(${SB\_REST}?code=eq.${code}&select=data,
{headers:{…SB_HDRS,‘Accept’:‘application/json’}});
const j=await r.json();
return j&&j[0]?j[0].data:null;
}catch(e){return null;}
}
async function sbWrite(code,data){
try{
// Upsert
await fetch(SB_REST,{
method:‘POST’,
headers:{…SB_HDRS,‘Prefer’:‘resolution=merge-duplicates’},
body:JSON.stringify({code,data})
});
}catch(e){}
}
async function sbDelete(code){
try{await fetch(${SB\_REST}?code=eq.${code},{method:‘DELETE’,headers:SB_HDRS});}catch(e){}
}

async function mpCreateRoom(){
const code=genRoomCode();
mpRoom=code; mpRole=‘host’;
const data={room:code,host:{ready:false,dead:false,score:0},guest:null,started:false};
await sbWrite(code,data);

}
async function mpJoinRoom(code){
mpRoom=code; mpRole=‘guest’;
// Write guest slot
const existing=await sbRead(code);
if(existing){
existing.guest={ready:false,dead:false,score:0};
await sbWrite(code,existing);
}
mpShowLobby(code,false);
mpStartPolling();
}
function mpShowLobby(code,isHost){
mpPanel.classList.add(‘show’);
mpBtn.style.display=‘none’;

function mpStartPolling(){
if(mpPollInterval) clearInterval(mpPollInterval);
mpPollInterval=setInterval(mpPoll,1200);
}
function mpStopPolling(){if(mpPollInterval){clearInterval(mpPollInterval);mpPollInterval=null;}}
async function mpPoll(){
const data=await sbRead(mpRoom);
if(!data) return;
const me =mpRole===‘host’?data.host:data.guest;
const opp=mpRole===‘host’?data.guest:data.host;

const hReady=data.host?.ready,gReady=data.guest?.ready;

mpStatus.textContent=HOST ${hTxt}  |  GUEST ${gTxt};

mpStatus.textContent=‘Waiting for opponent to open link…’;
}
if(hReady&&gReady&&!mpBothReady){
mpBothReady=true;mpStopPolling();
startMpGame();
}
}
// During game — check opponent died
if(state===‘playing’&&opp&&opp.dead&&!mpOpponentDead){
mpOpponentDead=true;
showMpResult(‘🏆 YOU WIN!’);

}
}
async function mpMarkReady(){
const data=await sbRead(mpRoom)||{room:mpRoom,host:{ready:false,dead:false,score:0},guest:null,started:false};
if(mpRole===‘host’) data.host.ready=true;
else if(data.guest) data.guest.ready=true;
else data.guest={ready:true,dead:false,score:0};

mpReadyBtn.disabled=true;mpReadyBtn.textContent=‘✅ READY!’;
mpStatus.textContent=‘Waiting for opponent…’;

async function mpReportDead(s){

particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,decay:Math.random()*0.03+0.015,r:Math.random()*5+2,hue});
}
}

spawnParticles(cx,p.top+p.gap+(H-p.top-p.gap)/2,[120,100,80,140],14,6);

function drawObstacles(){
pipes.forEach(p=>{
if(p.moving){ctx.save();ctx.strokeStyle=‘rgba(255,200,50,0.2)’;ctx.lineWidth=2;ctx.strokeRect(p.x-1,0,PIPE_W+2,p.top);ctx.strokeRect(p.x-1,p.top+p.gap,PIPE_W+2,H-p.top-p.gap);ctx.restore();}
const draw=(x,y,h,fl)=>{
if(currentWorld===‘ocean’) drawShark(x,y,h,fl);
else if(currentWorld===‘desert’) drawCactus(x,y,h,fl);
else if(currentWorld===‘space’) drawStarCluster(x,y,h,fl);
else if(currentWorld===‘city’) drawSkyscraper(x,y,h,fl);
else if(currentWorld===‘jungle’) drawTreeObstacle(x,y,h,fl);
else drawForestPipe(x,y,h,fl);
};
draw(p.x,0,p.top,false);draw(p.x,p.top+p.gap,H-p.top-p.gap,true);
});
}
// ══════════════════════════════════════════════════════════
// BIRD — with visible wing flap + squish
// ══════════════════════════════════════════════════════════
function drawBird(){
const{x,y,angle,wingPhase,flash,squishX,squishY}=bird;
ctx.save();ctx.translate(x,y);ctx.rotate(angle);
ctx.scale(squishX,squishY); // squish/stretch on flap
// Wing flap — compute wing position from wingPhase
const wFlap=Math.sin(wingPhase)*6; // bigger amplitude = more visible flap
if(bird.immortal){
const ia=ctx.createRadialGradient(0,0,8,0,0,28);
ia.addColorStop(0,‘rgba(255,255,100,0.3)’);ia.addColorStop(1,‘transparent’);
ctx.fillStyle=ia;ctx.beginPath();ctx.arc(0,0,28,0,Math.PI2);ctx.fill();
ctx.strokeStyle=rgba(255,220,50,${0.5+0.4*Math.sin(frame*0.25)});ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,24,0,Math.PI2);ctx.stroke();
}
if(activePU.shield>0){
const sa=ctx.createRadialGradient(0,0,10,0,0,26);
sa.addColorStop(0,‘rgba(68,170,255,0.25)’);sa.addColorStop(1,‘transparent’);
ctx.fillStyle=sa;ctx.beginPath();ctx.arc(0,0,26,0,Math.PI2);ctx.fill();
ctx.strokeStyle=rgba(68,170,255,${0.5+0.3*Math.sin(frame*0.2)});ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,22,0,Math.PI2);ctx.stroke();
}
if(flash>0) ctx.globalAlpha=0.4+0.6Math.abs(Math.sin(flash0.5));
// Shadow
ctx.save();ctx.globalAlpha=(ctx.globalAlpha||1)0.15;ctx.fillStyle=’#000’;ctx.beginPath();ctx.ellipse(2,16,10,4,0,0,Math.PI2);ctx.fill();ctx.restore();
// BACK WING — visible flapping up and down
ctx.save();
ctx.translate(-2, 2);
ctx.rotate(wFlap * 0.18); // rotate wing up/down
ctx.beginPath();ctx.ellipse(0,0,11,5,wFlap>0?-0.5:0.3,0,Math.PI*2);
ctx.fillStyle=’#b86c18’;ctx.fill();
ctx.restore();
// Body
ctx.beginPath();ctx.ellipse(0,0,13,10,0,0,Math.PI*2);
const bg=ctx.createRadialGradient(-3,-3,1,0,0,15);
bg.addColorStop(0,’#ffe060’);bg.addColorStop(0.5,’#f09818’);bg.addColorStop(1,’#b85808’);
ctx.fillStyle=bg;ctx.fill();
// Belly
ctx.beginPath();ctx.ellipse(2,3,7,5,0.2,0,Math.PI*2);ctx.fillStyle=’#fff5c0’;ctx.fill();
// FRONT WING — flaps opposite phase for natural look
ctx.save();
ctx.translate(-1, 1);
ctx.rotate(-wFlap * 0.14);
ctx.beginPath();ctx.ellipse(0,0,9,4,-0.3+wFlap0.05,0,Math.PI2);
ctx.fillStyle=’#d08828’;ctx.fill();
ctx.restore();
// Eye
ctx.beginPath();ctx.arc(6,-3,3.5,0,Math.PI2);ctx.fillStyle=’#fff’;ctx.fill();
ctx.beginPath();ctx.arc(7,-3,1.9,0,Math.PI2);ctx.fillStyle=’#1a0800’;ctx.fill();
ctx.beginPath();ctx.arc(7.6,-3.7,0.7,0,Math.PI*2);ctx.fillStyle=’#fff’;ctx.fill();
// Beak
ctx.beginPath();ctx.moveTo(11,-1);ctx.lineTo(19,-0.5);ctx.lineTo(11,3);ctx.closePath();ctx.fillStyle=’#ff8010’;ctx.fill();
ctx.beginPath();ctx.moveTo(11,1);ctx.lineTo(18,0.5);ctx.strokeStyle=’#cc5a08’;ctx.lineWidth=0.8;ctx.stroke();
ctx.restore();
}
// ══════════════════════════════════════════════════════════
// TRANSITION ORB
// ══════════════════════════════════════════════════════════
function drawTransOrb(){
if(!transOrb||transOrb.collected) return;
const{x,y,r,bob}=transOrb;
const oy=y+Math.sin(bob)7;
ctx.save();ctx.translate(x,oy);
transOrb.angle+=0.05;transOrb.bob+=0.06;transOrb.pulse+=0.08;
for(let ring=3;ring>=1;ring–){
ctx.save();ctx.rotate(transOrb.anglering0.3);
ctx.strokeStyle=rgba(255,240,100,${0.15*ring+0.05*Math.sin(transOrb.pulse)});
ctx.lineWidth=1.5;ctx.setLineDash([4,4]);ctx.beginPath();ctx.arc(0,0,r+ring8,0,Math.PI2);ctx.stroke();ctx.setLineDash([]);ctx.restore();
}
const cg=ctx.createRadialGradient(0,0,0,0,0,r+6);
cg.addColorStop(0,‘rgba(255,255,220,0.9)’);cg.addColorStop(0.4,‘rgba(255,220,60,0.6)’);cg.addColorStop(1,‘transparent’);
ctx.fillStyle=cg;ctx.beginPath();ctx.arc(0,0,r+6,0,Math.PI2);ctx.fill();
const ig=ctx.createRadialGradient(-r0.3,-r0.3,1,0,0,r);
ig.addColorStop(0,’#ffffff’);ig.addColorStop(0.4,’#ffee80’);ig.addColorStop(1,’#ff9920’);
ctx.fillStyle=ig;ctx.beginPath();ctx.arc(0,0,r,0,Math.PI2);ctx.fill();
ctx.fillStyle=’#fff’;
for(let i=0;i<6;i++){const sa=transOrb.angle+iMath.PI/3,sd=r+4+Math.sin(transOrb.pulse+i)*3;ctx.beginPath();ctx.arc(Math.cos(sa)*sd,Math.sin(sa)sd,1.5,0,Math.PI2);ctx.fill();}
ctx.font=‘14px serif’;ctx.textAlign=‘center’;ctx.textBaseline=‘middle’;ctx.fillStyle=’#fff5a0’;ctx.fillText(‘✦’,0,1);
ctx.restore();
}
function drawPowerup(pu){
if(pu.collected) return;
ctx.save();ctx.translate(pu.x,pu.y+Math.sin(pu.bob)5);pu.angle+=0.04;
ctx.save();ctx.rotate(pu.angle);
const grd=ctx.createRadialGradient(0,0,4,0,0,pu.r+4);
grd.addColorStop(0,’#44aaff88’);grd.addColorStop(1,‘transparent’);
ctx.fillStyle=grd;ctx.beginPath();ctx.arc(0,0,pu.r+4,0,Math.PI2);ctx.fill();
ctx.strokeStyle=’#44aaff99’;ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.beginPath();ctx.arc(0,0,pu.r+2,0,Math.PI2);ctx.stroke();ctx.setLineDash([]);ctx.restore();
const og=ctx.createRadialGradient(-3,-3,1,0,0,pu.r);
og.addColorStop(0,’#fff’);og.addColorStop(0.3,’#44aaff’);og.addColorStop(1,’#44aaff66’);
ctx.fillStyle=og;ctx.beginPath();ctx.arc(0,0,pu.r,0,Math.PI2);ctx.fill();
ctx.font=${pu.r}px serif;ctx.textAlign=‘center’;ctx.textBaseline=‘middle’;ctx.fillText(‘🛡’,0,1);
ctx.restore();
}
function drawParticles(){
particles.forEach(p=>{ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=hsl(${p.hue},85%,65%);ctx.shadowColor=hsl(${p.hue},80%,60%);ctx.shadowBlur=4;ctx.beginPath();ctx.arc(p.x,p.y,p.rp.life,0,Math.PI2);ctx.fill();ctx.restore();});
}
function drawScore(){
ctx.save();ctx.font=‘20px “Press Start 2P”’;ctx.textAlign=‘center’;
if(victoryMode){ctx.fillStyle=hsl(${frame*4%360},90%,65%);ctx.shadowColor=’#fff’;ctx.shadowBlur=12;}
else{ctx.fillStyle=‘rgba(0,0,0,0.28)’;ctx.fillText(score,W/2+1,46);ctx.fillStyle=’#fff’;ctx.shadowColor=‘rgba(0,0,0,0.5)’;ctx.shadowBlur=6;}
ctx.fillText(score,W/2,45);ctx.restore();
}
function drawVictory(){
if(!victoryMode) return;
ctx.save();ctx.strokeStyle=hsl(${frame*6%360},100%,60%);ctx.lineWidth=6;ctx.strokeRect(3,3,W-6,H-6);ctx.restore();
for(let i=0;i<8;i++){const cx=Math.random()*W,cy=Math.random()*H;ctx.save();ctx.globalAlpha=0.7;ctx.fillStyle=hsl(${Math.random()*360},90%,65%);ctx.fillRect(cx,cy,4,8);ctx.restore();}
if(victoryTimer>180){
ctx.save();ctx.font=‘16px “Press Start 2P”’;ctx.textAlign=‘center’;
ctx.fillStyle=hsl(${frame*5%360},90%,70%);ctx.shadowColor=’#fff’;ctx.shadowBlur=20;ctx.fillText(‘LEGENDARY!’,W/2,H/2-20);
ctx.font=‘8px “Press Start 2P”’;ctx.fillStyle=’#ffe060’;ctx.shadowBlur=8;ctx.fillText(‘BRACE FOR IMPACT…’,W/2,H/2+10);ctx.restore();
}
}
// ══════════════════════════════════════════════════════════
// COLLISION
// ══════════════════════════════════════════════════════════
function cc(ax,ay,ar,bx,by,br){const dx=ax-bx,dy=ay-by;return dxdx+dydy<(ar+br)*(ar+br);}
function checkCollision(){
if(bird.immortal||victoryMode) return false;
const bx=bird.x,by=bird.y,br=10;
if(by+br>H||by-br<0) return true;
for(const p of pipes){if(bx+br>p.x&&bx-br<p.x+PIPE_W){if(by-br<p.top||by+br>p.top+p.gap) return true;}}
return false;
}
// ══════════════════════════════════════════════════════════
// INPUT
// ══════════════════════════════════════════════════════════
function flap(){
if(state===‘idle’){state=‘playing’;overlay.classList.add(‘hidden’);doFlap();return;}
if(state===‘playing’){doFlap();return;}
if(state===‘dead’){startFresh();}
}
function doFlap(){
bird.vy=JUMP;
bird.wingPhase=0; // reset wing cycle to start of upstroke
// Squish on flap — briefly widen and shorten
bird.squishX=1.3;bird.squishY=0.75;
}
function startFresh(){
mpMode=false;
state=‘idle’;overlayScore.style.display=‘none’;secondChanceBtn.style.display=‘none’;
mpBtn.style.display=’’;mpPanel.classList.remove(‘show’);
overlayTip.style.display=‘block’;overlayMsg.style.display=‘block’;
overlayMsg.textContent=‘PRESS SPACE / TAP TO FLY’;overlay.classList.remove(‘hidden’);initGame(0,1);
}
function continueFromSave(){
state=‘idle’;overlayScore.style.display=‘none’;secondChanceBtn.style.display=‘none’;
overlayTip.style.display=‘block’;overlayMsg.style.display=‘block’;
overlayMsg.textContent=‘PRESS SPACE / TAP TO FLY’;overlay.classList.remove(‘hidden’);initGame(savedScore,1);
}
window.addEventListener(‘keydown’,e=>{if(e.code===‘Space’||e.code===‘ArrowUp’){e.preventDefault();flap();}});
canvas.addEventListener(‘pointerdown’,e=>{e.preventDefault();flap();});
secondChanceBtn.addEventListener(‘click’,e=>{e.stopPropagation();continueFromSave();});
// ══════════════════════════════════════════════════════════
// UPDATE
// ══════════════════════════════════════════════════════════
function update(){
updateShake();
updateScoreFlash();
if(state!==‘playing’) return;
frame++;
// Squish recovery
bird.squishX+=(1-bird.squishX)*0.25;
bird.squishY+=(1-bird.squishY)*0.25;
// Victory
if(victoryMode){
victoryTimer–;bird.vy=-0.5;bird.y=Math.max(H0.2,Math.min(H0.75,bird.y));
if(frame%4===0) spawnParticles(Math.random()*W,Math.random()*H,[Math.random()*360],2,3);
if(victoryTimer<=0){
victoryMode=false;state=‘idle’;
overlayTip.style.display=‘block’;overlayMsg.style.display=‘block’;
overlayMsg.textContent=‘🔥 10X HARDER. GO.’;overlayMsg.style.color=’#ff4422’;
overlay.classList.remove(‘hidden’);initGame(0,10);
setTimeout(()=>{overlayMsg.style.color=’’;},3000);
}
return;
}
// Bird
bird.vy+=GRAVITY;bird.y+=bird.vy;
bird.angle=Math.min(Math.PI/2.5,Math.max(-Math.PI/5,bird.vy*0.065));
bird.wingPhase+=0.22; // steady flap rhythm
if(bird.flash>0) bird.flash–;
// BG
clouds.forEach(c=>{c.x-=c.speed;if(c.x+c.w<0){c.x=W+c.w;c.y=Math.random()120+20;}});
bubbles.forEach(b=>{b.y-=b.speed;if(b.y+b.r<0){b.y=H+b.r;b.x=Math.random()W;}});
duneOffsets.forEach((_,i)=>{duneOffsets[i]=(duneOffsets[i]+currentTier.speed0.3)%(W+120);});
stars.forEach(s=>s.twinkle+=s.speed);
vines.forEach((v,i)=>{v.sway=Math.sin(frame0.02+i)*0.15;});
// World
const newWorld=getWorld(score);
if(newWorld!==currentWorld){
currentWorld=newWorld;applyWorldStyling(newWorld);
const fc={ocean:’#1a60c0’,desert:’#e09020’,space:’#6020c0’,city:’#2060c0’,jungle:’#208020’};
triggerWorldFlash(fc[newWorld]||’#ffffff’);
}
// Difficulty
const tier=getTier(score);
if(tier!==currentTier){
currentTier=tier;
diffBadge.textContent=tier.label+(diffMult>1?’ ×’+diffMult:’’);
diffBadge.style.color=score>=90?’#20ff60’:score>=70?’#ff2200’:score>=50?’#ff6600’:score>=30?’#ff9944’:’#a0c870’;
}
// Trans orb
if(!transOrb&&(score===28||score===48||score===98)) spawnTransOrb();
if(transOrb&&!transOrb.collected){
transOrb.x-=currentTier.speed*0.7;
if(cc(bird.x,bird.y,12,transOrb.x,transOrb.y+Math.sin(transOrb.bob)*7,transOrb.r)){
transOrb.collected=true;
pipes.forEach(p=>shatterPipe(p));pipes=[];
spawnParticles(transOrb.x,transOrb.y,[50,45,55,200,210],50,8);
bird.immortal=true;
setTimeout(()=>{bird.immortal=false;},3500);
if(score>=98){setTimeout(()=>{victoryMode=true;victoryTimer=240;bird.immortal=true;pipes=[];},400);}
}
if(transOrb.x<-40) transOrb=null;
}
// ── Spawn pipes ───────────────────────────────────────────────
nextPipeIn–;
if(nextPipeIn<=0){
const gap=currentTier.gap;
const minT=60,maxT=H-gap-60;

// Moving pipe logic: max 3 consecutive, only every ~20 pipes
pipesSinceMoving++;
let moving=false;
if(score>=20&&pipesSinceMoving>=20&&consecutiveMoving<3&&Math.random()<0.4){
  moving=true;consecutiveMoving++;
} else if(!moving){
  if(consecutiveMoving>0) consecutiveMoving=0;
  // Reset counter after a run of statics
  if(pipesSinceMoving>25) pipesSinceMoving=0;
}
if(moving) pipesSinceMoving=0; // reset gap counter after spawning a mover

const newPipe={x:W+10,top:Math.random()*(maxT-minT)+minT,gap,scored:false,moving,
  vyPipe:moving?(Math.random()*0.9+0.4)*(Math.random()<0.5?1:-1):0,hasPU:false,puSpawned:false};
pipesSinceLastPU++;
if(pipesSinceLastPU>=7+(Math.random()<0.5?0:1)){newPipe.hasPU=true;pipesSinceLastPU=0;}
pipes.push(newPipe);
nextPipeIn=currentTier.every;


}
// Move pipes
pipes.forEach(p=>{
p.x-=currentTier.speed;
if(p.moving){p.top+=p.vyPipe;if(p.top<30||p.top>H-p.gap-30) p.vyPipe*=-1;}
if(p.hasPU&&!p.puSpawned&&p.x<W-20){p.puSpawned=true;spawnPowerupBetweenPipe(p);}
if(!p.scored&&p.x+PIPE_W<bird.x){
p.scored=true;score++;
if(score>best_score){best_score=score;bestDisplay.textContent=best_score;}
scoreDisplay.textContent=score;
// Score flash on every pipe
triggerScoreFlash(’+1’);
// Milestone flash
if(MILESTONES.includes(score)){
triggerScoreFlash(MILESTONE_MSGS[score]||‘MILESTONE!’,’#ff9900’);
spawnParticles(bird.x,bird.y,[40,50,55,200],20,4);
}
// Multiplayer: report score
if(mpMode) mpReportDead(score); // no — just update score periodically? Keep simple: no-op
}
});
pipes=pipes.filter(p=>p.x+PIPE_W>-20);
// Power-ups
powerups.forEach(pu=>{
pu.x-=currentTier.speed*0.85;pu.bob+=0.06;
if(!pu.collected&&cc(bird.x,bird.y,12,pu.x,pu.y+Math.sin(pu.bob)*5,pu.r)){
pu.collected=true;activePU.shield=PU_DURATION.shield;
spawnParticles(pu.x,pu.y,[210,200,220],18);
}
});
powerups=powerups.filter(pu=>!pu.collected&&pu.x>-40);
if(activePU.shield>0) activePU.shield–;
updatePUHud();
// Particles
particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.15;p.life-=p.decay;});
particles=particles.filter(p=>p.life>0);
// Collision
if(checkCollision()){
if(activePU.shield>0){
activePU.shield=0;spawnParticles(bird.x,bird.y,[210,200,220],30);bird.flash=20;updatePUHud();
} else {
triggerShake(10);
spawnParticles(bird.x,bird.y,[40,32,20,10],28);
state=‘dead’;
if(mpMode) mpReportDead(score);
if(score>=50){
savedScore=score>=90?90:score>=65?65:score>=50?50:score;
continueScoreEl.textContent=savedScore;secondChanceBtn.style.display=‘block’;
}
finalScore.textContent=score;
diffLabel.textContent=score>=90?‘🌴 JUNGLE’:score>=65?‘🏙️ CITY’:score>=50?‘🚀 SPACE’:score>=40?‘🏜️ DESERT’:score>=30?‘🌊 OCEAN’:’’;
overlayTip.style.display=‘none’;overlayMsg.style.display=‘none’;overlayScore.style.display=‘block’;
setTimeout(()=>{
overlay.classList.remove(‘hidden’);overlayMsg.style.display=‘block’;
overlayMsg.textContent=‘PRESS SPACE / TAP TO RETRY’;
if(!mpMode){mpBtn.style.display=’’;}
},600);
}
}
}
function draw(){
ctx.save();
if(shakeAmt>0) ctx.translate(shakeX,shakeY);
drawBackground();
drawObstacles();
powerups.forEach(drawPowerup);
drawTransOrb();
drawParticles();
drawBird();
drawVictory();
drawMpResult();
if(state===‘playing’) drawScore();
ctx.restore();
}
function loop(){update();draw();requestAnimationFrame(loop);}
initGame(0,1);
loop();
</script>
